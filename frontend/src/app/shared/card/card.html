<article class="app-card" [class.app-card--no-image]="!imageUrl()">
  @if (badgeText()) {
    <span class="app-card__badge">{{ badgeText() }}</span>
  }

  <div class="app-card__image-wrap">
    @if (imageUrl()) {
      <img [src]="imageUrl()" [alt]="imageAlt()" class="app-card__image" />
    } @else {
      <div class="app-card__image-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </div>
    }
  </div>

  <div class="app-card__body">
    <div class="app-card__top">
      <h3 class="app-card__title">{{ title() }}</h3>
      @if (subtitle()) {
        <p class="app-card__subtitle">{{ subtitle() }}</p>
      }
      @if (description()) {
        <p class="app-card__desc">{{ description() }}</p>
      }
      @if (metaPills().length > 0) {
        <div class="app-card__meta">
          @for (pill of metaPills(); track pill) {
            <span class="app-card__pill">{{ pill }}</span>
          }
        </div>
      }

      <ng-content></ng-content>
    </div>

    <div class="app-card__actions">
      <ng-content select="[card-primary]"></ng-content>
      @if (showViewDetails()) {
        <button type="button" class="app-card__btn-secondary" (click)="viewDetails.emit()">
          {{ viewDetailsLabel() }}
        </button>
      }
    </div>
  </div>
</article>
