# ============================================
# Application Configuration
# ============================================
spring.application.name=Smart-Travel-Management-System
# Default to dev profile (can be overridden by environment variable or command-line arg)
spring.profiles.default=dev
app.name=Smart Travel Management System
app.version=1.0.0
app.api-version=v1
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:4200}
app.ai.gemini-api-key=${GEMINI_API_KEY:}
app.ai.gemini-model=${GEMINI_MODEL:gemini-2.0-flash}
app.upload.dir=${UPLOAD_DIR:uploads}

# ============================================
# Payment Gateway (SSLCommerz sandbox)
# ============================================
# Credentials come from environment variables only â€” leave blank to disable real
# checkout (initiateSession will fail fast with a clear error rather than silently
# call SSLCommerz with empty credentials).
app.payment.sslcommerz.store-id=${SSLCOMMERZ_STORE_ID:}
app.payment.sslcommerz.store-password=${SSLCOMMERZ_STORE_PASSWORD:}
app.payment.sslcommerz.api-url=${SSLCOMMERZ_API_URL:https://sandbox.sslcommerz.com/gwprocess/v4/api.php}
app.payment.sslcommerz.validation-url=${SSLCOMMERZ_VALIDATION_URL:https://sandbox.sslcommerz.com/validator/api/validationserverAPI.php}
app.payment.pending-expiry-minutes=${PAYMENT_PENDING_EXPIRY_MINUTES:30}

# ============================================
# File Upload
# ============================================
# Servlet-level ceiling only â€” UploadValidationService enforces the real,
# per-category limits (images 5MB, documents 10MB) after content validation.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# Database Configuration
# ============================================
# Use environment variables for sensitive data
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/travel_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# Custom database properties
app.database.url=${spring.datasource.url}
app.database.username=${spring.datasource.username}
app.database.password=${spring.datasource.password}
app.database.driver-class-name=${spring.datasource.driver-class-name}

# ============================================
# JPA / Hibernate Settings
# ============================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# Custom JPA properties
app.database.jpa.ddl-auto=${spring.jpa.hibernate.ddl-auto}
app.database.jpa.show-sql=${spring.jpa.show-sql}
app.database.jpa.dialect=${spring.jpa.properties.hibernate.dialect}

# ============================================
# Security Configuration
# ============================================
# JWT Configuration
# Feature flag for gradual rollout (default: true - JWT is the primary auth mechanism)
app.security.jwt.enabled=${JWT_ENABLED:true}
app.security.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationPleaseChangeInProduction256BitMinimum}
app.security.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:900000}
app.security.jwt.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL:604800000}
app.security.jwt.issuer=${JWT_ISSUER:com.aptms.auth}
app.security.jwt.audience=${JWT_AUDIENCE:com.aptms.api}
app.security.jwt.algorithm=${JWT_ALGORITHM:HS256}

# Legacy JWT expiration (deprecated, use access-token-ttl instead)
app.security.jwt.expiration-ms=${JWT_EXPIRATION:900000}

# CORS Configuration
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
app.security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.security.cors.allowed-headers=*
app.security.cors.allow-credentials=true

# Password Configuration
app.security.password.strength=${PASSWORD_STRENGTH:10}
app.security.password.min-length=${PASSWORD_MIN_LENGTH:8}

# Account Lockout Configuration
app.security.account.max-failed-attempts=${MAX_FAILED_ATTEMPTS:5}
app.security.account.lockout-duration-minutes=${LOCKOUT_DURATION_MINUTES:15}

# ============================================
# Redis Configuration
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ============================================
# Mail / OTP Configuration
# ============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:no-reply@aptms.app}

app.otp.ttl-minutes=${OTP_TTL_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:45}

# ============================================
# Pagination Configuration
# ============================================
app.pagination.default-page-size=${DEFAULT_PAGE_SIZE:20}
app.pagination.max-page-size=${MAX_PAGE_SIZE:100}

# ============================================
# API Configuration
# ============================================
app.api.base-path=/api
app.api.version=v1

# ============================================
# Logging Configuration
# ============================================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.aptms=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL:TRACE}

# ============================================
# Server Configuration
# ============================================
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ============================================
# Actuator Configuration
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ============================================
# OpenAPI/Swagger Configuration
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.activated=true




