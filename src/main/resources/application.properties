# ============================================
# Application Configuration
# ============================================
spring.application.name=AI-Powered-Travel-Management-System
app.name=AI-Powered Travel Management System
app.version=1.0.0
app.api-version=v1
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ============================================
# Database Configuration
# ============================================
# Use environment variables for sensitive data
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/travel_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# Custom database properties
app.database.url=${spring.datasource.url}
app.database.username=${spring.datasource.username}
app.database.password=${spring.datasource.password}
app.database.driver-class-name=${spring.datasource.driver-class-name}

# ============================================
# JPA / Hibernate Settings
# ============================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# Custom JPA properties
app.database.jpa.ddl-auto=${spring.jpa.hibernate.ddl-auto}
app.database.jpa.show-sql=${spring.jpa.show-sql}
app.database.jpa.dialect=${spring.jpa.properties.hibernate.dialect}

# ============================================
# Security Configuration
# ============================================
app.security.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationPleaseChangeInProduction}
app.security.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
app.security.jwt.issuer=${JWT_ISSUER:APTMS}

app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
app.security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.security.cors.allowed-headers=*
app.security.cors.allow-credentials=true

app.security.password.strength=${PASSWORD_STRENGTH:10}
app.security.password.min-length=${PASSWORD_MIN_LENGTH:8}

# ============================================
# Pagination Configuration
# ============================================
app.pagination.default-page-size=${DEFAULT_PAGE_SIZE:20}
app.pagination.max-page-size=${MAX_PAGE_SIZE:100}

# ============================================
# API Configuration
# ============================================
app.api.base-path=/api
app.api.version=v1

# ============================================
# Logging Configuration
# ============================================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.aptms=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LOG_LEVEL:TRACE}

# ============================================
# Server Configuration
# ============================================
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ============================================
# Actuator Configuration (Optional)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized