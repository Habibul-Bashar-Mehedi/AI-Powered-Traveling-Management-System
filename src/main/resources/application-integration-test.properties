
# ============================================================
# Integration Test Profile (spring.profiles.active=integration-test)
# ============================================================
# Used exclusively by AbstractIntegrationTest and its subclasses.
# Testcontainers overrides spring.datasource.* and spring.data.redis.*
# at runtime via @ServiceConnection / @DynamicPropertySource.
# ============================================================

# Disable Flyway — migrations assume pre-existing schema from V000 onward.
# Integration tests use ddl-auto=create-drop to let Hibernate build the schema
# from entity definitions against a real MySQL container.
spring.flyway.enabled=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT — use a deterministic test secret (never use in production)
app.security.jwt.enabled=true
app.security.jwt.secret=integrationTestSecretKeyForJWTAtLeast256BitsLong1234567890ABCDEF
app.security.jwt.access-token-ttl=3600000
app.security.jwt.refresh-token-ttl=86400000
app.security.jwt.expiration-ms=3600000
app.security.jwt.issuer=SMTS
app.security.jwt.audience=com.aptms.api
app.security.jwt.algorithm=HS256

# CORS
app.security.cors.allowed-origins=*
app.security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.security.cors.allowed-headers=*
app.security.cors.allow-credentials=true

# Password
app.security.password.strength=4
app.security.password.min-length=8

# Account lockout (keep default: 5 attempts, 15-min lockout)
app.security.account.max-failed-attempts=5
app.security.account.lockout-duration-minutes=15

# Pagination
app.pagination.default-page-size=20
app.pagination.max-page-size=100

# File uploads (use /tmp so no real disk writes needed in tests)
app.upload.dir=/tmp/aptms-test-uploads

# AI API key intentionally empty in tests — no Gemini calls in integration tests
app.ai.gemini-api-key=

# Use simple in-memory cache (no Redis for caching, only for token blacklist)
spring.cache.type=simple

# Server
server.port=0

# Logging — keep noise low; set aptms=INFO to see service-layer errors
logging.level.root=WARN
logging.level.aptms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.testcontainers=INFO

# Actuator — disable most endpoints in tests
management.endpoints.web.exposure.include=health

