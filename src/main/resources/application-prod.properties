# ============================================
# Production Environment Configuration
# ============================================

# Database Configuration (Production - Use Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA Settings (Production)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Security (Production - Strict)
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-ms=${JWT_EXPIRATION:3600000}

# CORS (Production - Specific Origins Only)
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Logging (Production - Minimal)
logging.level.root=WARN
logging.level.aptms=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never

# Connection Pool (Production)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
