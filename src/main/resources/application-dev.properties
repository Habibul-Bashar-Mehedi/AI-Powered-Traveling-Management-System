# ============================================
# Development Environment Configuration
# ============================================

# Database Configuration (Development)
spring.datasource.url=jdbc:mysql://localhost:3306/travel_db_dev
spring.datasource.username=root
spring.datasource.password=password

# JPA Settings (Development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security (Development - Less Strict)
app.security.jwt.secret=devSecretKeyForJWTTokenGeneration
app.security.jwt.expiration-ms=86400000

# CORS (Development - Allow Local Frontend)
app.security.cors.allowed-origins=http://localhost:4200,http://localhost:3000,http://localhost:8081

# Logging (Development - Verbose)
logging.level.root=INFO
logging.level.aptms=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Server Configuration
server.port=8080
server.error.include-stacktrace=always
