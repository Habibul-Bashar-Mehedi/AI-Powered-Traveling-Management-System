# ============================================
# Development Environment Configuration
# ============================================
# Activate this file by starting with: --spring.profiles.active=dev
# The TestDataSeeder bean (@Profile("dev")) seeds test accounts on first run.

# Database Configuration (Development)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/travel_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# JPA Settings (Development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security (Development - Less Strict)
app.security.jwt.enabled=true
app.security.jwt.secret=devSecretKeyForJWTTokenGenerationAtLeast256BitsLong!
app.security.jwt.access-token-ttl=86400000
app.security.jwt.refresh-token-ttl=604800000

# CORS (Development - Allow Local Frontend)
app.security.cors.allowed-origins=http://localhost:4200
app.security.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.security.cors.allowed-headers=*
app.security.cors.allow-credentials=true

# Logging (Development - Verbose)
logging.level.root=INFO
logging.level.aptms=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Server Configuration
server.port=8080
server.error.include-stacktrace=always
